{% extends "base/base.html" %}
{% block title %}Nouveau compte{% endblock %}
{% block page_title %}Créer un compte{% endblock %}
{% block content %}
<div class="page-header"><div><h1>🔑 Créer un utilisateur</h1></div><a href="/utilisateurs/" class="btn btn-outline">← Retour</a></div>
<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="grid-2" style="gap:14px;">
        <div><label class="form-label">Prénom *</label><input type="text" name="first_name" class="form-control" required></div>
        <div><label class="form-label">Nom *</label><input type="text" name="last_name" class="form-control" required></div>
        <div><label class="form-label">Nom d'utilisateur *</label><input type="text" name="username" class="form-control" required></div>
        <div>
          <label class="form-label">Rôle *</label>
          <select name="role" class="form-select" required>
            <option value="medecin">🩺 Médecin</option>
            <option value="infirmier">💉 Infirmier(e)</option>
            <option value="pharmacien">💊 Pharmacien(ne)</option>
            <option value="laborantin">🔬 Laborantin(e)</option>
            <option value="receptionniste">📋 Réceptionniste</option>
            <option value="comptable">💰 Comptable</option>
            <option value="chef">👑 Chef / Directeur</option>
            <option value="patient">👤 Patient</option>
          </select>
        </div>
        <div><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
        <div><label class="form-label">Téléphone</label><input type="text" name="telephone" class="form-control" placeholder="+242 06..."></div>
        <div>
          <label class="form-label">Genre</label>
          <select name="genre" class="form-select">
            <option value="">—</option>
            <option value="M">Masculin</option>
            <option value="F">Féminin</option>
            <option value="A">Autre</option>
          </select>
        </div>
        <div><label class="form-label">Date de naissance</label><input type="date" name="date_naissance" class="form-control"></div>
        <div><label class="form-label">Mot de passe *</label><input type="password" name="password1" class="form-control" required></div>
        <div><label class="form-label">Confirmer *</label><input type="password" name="password2" class="form-control" required></div>
      </div>
      <div style="margin-top:14px;"><label class="form-label">Adresse</label><textarea name="adresse" class="form-control" rows="2"></textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <a href="/utilisateurs/" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn btn-primary">✅ Créer le compte</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
