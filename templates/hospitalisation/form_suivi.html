{% extends "base/base.html" %}
{% block title %}Suivi quotidien{% endblock %}
{% block page_title %}Suivi quotidien{% endblock %}
{% block content %}
<div class="page-header"><div><h1>📊 Suivi quotidien</h1><div class="breadcrumb">{{ hosp.patient }} — {{ hosp.service }}</div></div><a href="/hospitalisation/{{ hosp.pk }}/" class="btn btn-outline">← Retour</a></div>
<form method="post">
  {% csrf_token %}
  <div class="grid-2" style="align-items:start;">
    <div class="card">
      <div class="card-header"><h5>💓 Constantes vitales</h5></div>
      <div class="card-body">
        <div class="grid-2" style="gap:14px;">
          <div><label class="form-label">Tension artérielle</label><input type="text" name="tension" class="form-control" placeholder="120/80 mmHg"></div>
          <div><label class="form-label">Température (°C)</label><input type="number" name="temperature" class="form-control" step="0.1" placeholder="37.0"></div>
          <div><label class="form-label">Fréquence cardiaque</label><input type="number" name="frequence_cardiaque" class="form-control" placeholder="80 bpm"></div>
          <div><label class="form-label">SpO₂ (%)</label><input type="number" name="saturation_o2" class="form-control" placeholder="98"></div>
          <div><label class="form-label">Poids (kg)</label><input type="number" name="poids" class="form-control" step="0.1"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h5>📝 Note clinique</h5></div>
      <div class="card-body">
        <div class="mb-2"><label class="form-label">Évolution clinique *</label><textarea name="evolution" class="form-control" rows="4" required placeholder="État général, évolution depuis hier..."></textarea></div>
        <div class="mb-2"><label class="form-label">Traitement en cours</label><textarea name="traitement_en_cours" class="form-control" rows="2"></textarea></div>
        <div class="mb-2"><label class="form-label">Nouvelles prescriptions</label><textarea name="prescriptions_nouvelles" class="form-control" rows="2"></textarea></div>
        <div><label class="form-label">Observations</label><textarea name="observations" class="form-control" rows="2"></textarea></div>
      </div>
    </div>
  </div>
  <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end;">
    <a href="/hospitalisation/{{ hosp.pk }}/" class="btn btn-outline">Annuler</a>
    <button type="submit" class="btn btn-primary btn-lg">📊 Enregistrer le suivi</button>
  </div>
</form>
{% endblock %}
