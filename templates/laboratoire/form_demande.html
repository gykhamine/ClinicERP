{% extends "base/base.html" %}
{% block title %}Prescrire analyses{% endblock %}
{% block page_title %}Prescrire des analyses{% endblock %}
{% block content %}
<div class="page-header"><div><h1>🔬 Prescrire des analyses</h1></div><a href="/laboratoire/" class="btn btn-outline">← Retour</a></div>
<div class="card" style="max-width:800px;">
  <div class="card-header"><h5>Nouvelle demande d'analyse</h5></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="grid-2" style="gap:14px;margin-bottom:16px;">
        <div>
          <label class="form-label">Patient *</label>
          <select name="patient" class="form-select" required>
            <option value="">— Sélectionner —</option>
            {% for p in patients %}<option value="{{ p.pk }}">{{ p.utilisateur.get_full_name }} ({{ p.numero_dossier }})</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="form-label">Priorité</label>
          <select name="priorite" class="form-select">
            <option value="normale">Normale</option>
            <option value="urgente">⚠️ Urgente</option>
            <option value="tres_urgente">🚨 Très urgente</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <label class="form-label">Types d'analyses * (sélection multiple)</label>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:280px;overflow-y:auto;border:1.5px solid var(--border);border-radius:8px;padding:12px;">
          {% for t in types %}
          <label style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:white;transition:background .1s;" onmouseenter="this.style.background='var(--primary-light)'" onmouseleave="this.style.background='white'">
            <input type="checkbox" name="types_analyses" value="{{ t.pk }}" style="width:16px;height:16px;">
            <div>
              <div style="font-weight:600;font-size:13px;">{{ t.code }}</div>
              <div style="font-size:11px;color:var(--text-muted);">{{ t.nom }} • {{ t.prix|floatformat:0 }} FCFA</div>
            </div>
          </label>
          {% endfor %}
        </div>
      </div>
      <div>
        <label class="form-label">Notes cliniques</label>
        <textarea name="notes" class="form-control" rows="2" placeholder="Contexte clinique, signes d'appel..."></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <a href="/laboratoire/" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn btn-primary">🔬 Envoyer au laboratoire</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
